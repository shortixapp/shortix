<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Link not found · Shortix</title>
<link rel="icon" type="image/png" href="/images/icon-32.png">
<link rel="stylesheet" href="/css/styles.css">
<style>
  .not-found-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 24px;
  }
  .not-found-inner{ max-width:480px; }
  .not-found-code{
    font-size:clamp(80px,15vw,140px);
    font-weight:900;
    font-family:var(--mono);
    background:var(--grad);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    line-height:1;
    margin:0 0 12px;
  }
  .not-found-title{ font-size:24px; font-weight:700; margin:0 0 12px; }
  .not-found-sub{ color:var(--text-dim); margin:0 0 36px; font-size:15.5px; }
  .not-found-actions{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="bg-aurora"></div>
<div class="not-found-wrap">
  <div class="not-found-inner glass" style="padding:48px 40px;border-radius:24px;">
    <div class="not-found-code">404</div>
    <h1 class="not-found-title">Link not found</h1>
    <p class="not-found-sub">This short link doesn't exist or may have been removed by its owner.</p>
    <div class="not-found-actions">
      <a href="/" class="btn btn-primary">Go home</a>
      <a href="/dashboard.html" class="btn btn-ghost">My dashboard</a>
    </div>
  </div>
</div>
<script src="/js/i18n.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
